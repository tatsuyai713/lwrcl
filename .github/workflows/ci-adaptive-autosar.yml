name: CI (Adaptive AUTOSAR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ADAPTIVE_AUTOSAR_REF: "master"
  DDS_PREFIX: /opt/cyclonedds
  ICEORYX_PREFIX: /opt/iceoryx
  VSOMEIP_PREFIX: /opt/vsomeip
  AUTOSAR_AP_PREFIX: /opt/autosar_ap
  LWRCL_PREFIX: /opt/autosar-ap-libs

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake automake autoconf git curl \
            libasio-dev libssl-dev libyaml-cpp-dev \
            libboost-dev libopencv-dev \
            python3 python3-pip

      - name: Cache middleware stack
        id: cache-middleware-stack
        uses: actions/cache@v4
        with:
          path: |
            /opt/cyclonedds
            /opt/iceoryx
            /opt/vsomeip
          key: adaptive-autosar-middleware-${{ env.ADAPTIVE_AUTOSAR_REF }}-ubuntu2404-v1

      - name: Build & install middleware stack (Adaptive-AUTOSAR script)
        if: steps.cache-middleware-stack.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/adaptive_autosar_build"
          mkdir -p "$WORK" && cd "$WORK"
          if [ ! -d Adaptive-AUTOSAR ]; then
            git clone --depth 1 --branch ${ADAPTIVE_AUTOSAR_REF} https://github.com/tatsuyai713/Adaptive-AUTOSAR.git
          fi
          cd Adaptive-AUTOSAR
          ./scripts/install_middleware_stack.sh \
            --install-base-deps \
            --cyclonedds-prefix ${DDS_PREFIX} \
            --iceoryx-prefix ${ICEORYX_PREFIX} \
            --vsomeip-prefix ${VSOMEIP_PREFIX}

      - name: Cache Adaptive AUTOSAR runtime
        id: cache-adaptive-autosar
        uses: actions/cache@v4
        with:
          path: /opt/autosar_ap
          key: adaptive-autosar-runtime-${{ env.ADAPTIVE_AUTOSAR_REF }}-ubuntu2404-v4

      - name: Build & install Adaptive AUTOSAR runtime
        if: steps.cache-adaptive-autosar.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/adaptive_autosar_build"
          mkdir -p "$WORK" && cd "$WORK"
          if [ ! -d Adaptive-AUTOSAR ]; then
            git clone --depth 1 --branch ${ADAPTIVE_AUTOSAR_REF} https://github.com/tatsuyai713/Adaptive-AUTOSAR.git
          fi
          cd Adaptive-AUTOSAR
          ./scripts/build_and_install_autosar_ap.sh \
            --prefix ${AUTOSAR_AP_PREFIX} \
            --build-dir build-ci \
            --vsomeip-prefix ${VSOMEIP_PREFIX} \
            --iceoryx-prefix ${ICEORYX_PREFIX} \
            --cyclonedds-prefix ${DDS_PREFIX}

      - name: Configure environment
        run: |
          echo "$DDS_PREFIX/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$ICEORYX_PREFIX/lib:$DDS_PREFIX/lib:$VSOMEIP_PREFIX/lib:$AUTOSAR_AP_PREFIX/lib:$LWRCL_PREFIX/lib" >> $GITHUB_ENV

      - name: Install Python dependency for ARXML generation
        run: |
          python3 -m pip install --user pyyaml

      - name: Build & install lwrcl (Adaptive AUTOSAR)
        run: |
          sudo ldconfig
          ./build_libraries.sh adaptive-autosar install
          ./build_data_types.sh adaptive-autosar install
          ./build_lwrcl.sh adaptive-autosar install
          ./build_apps.sh adaptive-autosar install

      - name: Smoke check installed artifacts
        run: |
          test -f /opt/autosar-ap-libs/lib/liblwrcl.so
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest.arxml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest.yaml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_dds.yaml
          if /opt/autosar_ap/bin/autosar-generate-comm-manifest --help 2>&1 | grep -q "iceoryx"; then
            test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_iceoryx.yaml
          fi
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_vsomeip.yaml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_topic_mapping.yaml
          test -x apps/install-adaptive-autosar/bin/example_spin
          test -x apps/install-adaptive-autosar/bin/example_service_server

      - name: Smoke check runtime backend selection (DDS / vsomeip / iceoryx)
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="/opt/iceoryx/lib:$DDS_PREFIX/lib:$VSOMEIP_PREFIX/lib:$AUTOSAR_AP_PREFIX/lib:$LWRCL_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          export VSOMEIP_CONFIGURATION="${AUTOSAR_AP_PREFIX}/configuration/vsomeip-rpi.json"

          cleanup_runtime_processes() {
            pkill -x autosar_vsomeip_routing_manager || true
            pkill -x iox-roudi || true
            pkill -x example_class_sub || true
            pkill -x example_class_pub || true
          }

          hard_timeout() {
            timeout --signal=TERM --kill-after=2s "$@"
          }

          run_dds_or_vsomeip_profile() {
            local binding="$1"
            local pub_log="$2"
            local sub_log="$3"
            local rm_log="$4"
            local expect_register_event="$5"

            cleanup_runtime_processes
            unset ARA_COM_BINDING_MANIFEST
            export ARA_COM_EVENT_BINDING="${binding}"

            hard_timeout 12s "${AUTOSAR_AP_PREFIX}/bin/autosar_vsomeip_routing_manager" > "${rm_log}" 2>&1 &
            local rm_pid=$!
            sleep 1

            hard_timeout 8s apps/install-adaptive-autosar/bin/example_class_sub > "${sub_log}" 2>&1 &
            local sub_pid=$!
            sleep 1

            hard_timeout 6s apps/install-adaptive-autosar/bin/example_class_pub > "${pub_log}" 2>&1 || true
            wait "${sub_pid}" || true
            wait "${rm_pid}" || true

            grep -q "Publishing: 'Hello, world!" "${pub_log}"
            grep -q "I heard: 'Hello, world!" "${sub_log}"
            if [ "${expect_register_event}" = "yes" ]; then
              grep -q "REGISTER EVENT" "${rm_log}"
            else
              ! grep -q "REGISTER EVENT" "${rm_log}"
            fi
          }

          trap cleanup_runtime_processes EXIT INT TERM

          run_dds_or_vsomeip_profile \
            dds \
            /tmp/lwrcl_autosar_dds_pub.log \
            /tmp/lwrcl_autosar_dds_sub.log \
            /tmp/lwrcl_autosar_dds_rm.log \
            no

          run_dds_or_vsomeip_profile \
            vsomeip \
            /tmp/lwrcl_autosar_vsomeip_pub.log \
            /tmp/lwrcl_autosar_vsomeip_sub.log \
            /tmp/lwrcl_autosar_vsomeip_rm.log \
            yes

          if [ -x /opt/iceoryx/bin/iox-roudi ]; then
            cleanup_runtime_processes
            unset ARA_COM_BINDING_MANIFEST
            export ARA_COM_EVENT_BINDING=iceoryx

            hard_timeout 12s /opt/iceoryx/bin/iox-roudi > /tmp/lwrcl_autosar_iceoryx_roudi.log 2>&1 &
            ROUDI_PID=$!
            hard_timeout 12s "${AUTOSAR_AP_PREFIX}/bin/autosar_vsomeip_routing_manager" > /tmp/lwrcl_autosar_iceoryx_rm.log 2>&1 &
            ICEORYX_RM_PID=$!
            sleep 1

            hard_timeout 8s apps/install-adaptive-autosar/bin/example_class_sub > /tmp/lwrcl_autosar_iceoryx_sub.log 2>&1 &
            ICEORYX_SUB_PID=$!
            sleep 1

            hard_timeout 6s apps/install-adaptive-autosar/bin/example_class_pub > /tmp/lwrcl_autosar_iceoryx_pub.log 2>&1 || true
            wait "${ICEORYX_SUB_PID}" || true
            wait "${ICEORYX_RM_PID}" || true
            wait "${ROUDI_PID}" || true

            grep -q "Publishing: 'Hello, world!" /tmp/lwrcl_autosar_iceoryx_pub.log
            grep -q "I heard: 'Hello, world!" /tmp/lwrcl_autosar_iceoryx_sub.log
            ! grep -q "APP_WITH_SAME_NAME_STILL_RUNNING" /tmp/lwrcl_autosar_iceoryx_sub.log
            ! grep -q "APP_WITH_SAME_NAME_STILL_RUNNING" /tmp/lwrcl_autosar_iceoryx_pub.log
            ! grep -Eiq "error|fatal|panic" /tmp/lwrcl_autosar_iceoryx_roudi.log
          else
            echo "Skip iceoryx runtime smoke (iox-roudi is unavailable)."
          fi

          cleanup_runtime_processes

      - name: Smoke check service request/response
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="/opt/iceoryx/lib:$DDS_PREFIX/lib:$VSOMEIP_PREFIX/lib:$AUTOSAR_AP_PREFIX/lib:$LWRCL_PREFIX/lib:${LD_LIBRARY_PATH:-}"

          cleanup_sr_processes() {
            pkill -x autosar_vsomeip_routing_manager || true
            pkill -x iox-roudi || true
            pkill -x example_service_server || true
            pkill -x example_service_client || true
          }

          hard_timeout() { timeout --signal=TERM --kill-after=2s "$@"; }

          trap cleanup_sr_processes EXIT INT TERM
          cleanup_sr_processes

          hard_timeout 12s "${AUTOSAR_AP_PREFIX}/bin/autosar_vsomeip_routing_manager" > /tmp/lwrcl_autosar_sr_rm.log 2>&1 &
          RM_PID=$!
          sleep 1

          hard_timeout 8s apps/install-adaptive-autosar/bin/example_service_server > /tmp/lwrcl_autosar_service_server.log 2>&1 &
          SRV_PID=$!
          sleep 1

          hard_timeout 6s apps/install-adaptive-autosar/bin/example_service_client > /tmp/lwrcl_autosar_service_client.log 2>&1 || true
          wait "${SRV_PID}" || true
          wait "${RM_PID}" || true

          grep -q "Create CameraInfo service server." /tmp/lwrcl_autosar_service_server.log
          grep -q "Received request." /tmp/lwrcl_autosar_service_server.log
          grep -q "Success to call service." /tmp/lwrcl_autosar_service_client.log

          cleanup_sr_processes

      - name: Smoke check Adaptive AUTOSAR loaned-message API
        run: |
          set -euo pipefail
          export LD_LIBRARY_PATH="/opt/iceoryx/lib:$DDS_PREFIX/lib:$VSOMEIP_PREFIX/lib:$AUTOSAR_AP_PREFIX/lib:$LWRCL_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          export VSOMEIP_CONFIGURATION="${AUTOSAR_AP_PREFIX}/configuration/vsomeip-rpi.json"

          cleanup_zero_copy_processes() {
            pkill -x autosar_vsomeip_routing_manager || true
            pkill -x iox-roudi || true
            pkill -x example_zero_copy_sub || true
            pkill -x example_zero_copy_pub || true
          }

          hard_timeout() {
            timeout --signal=TERM --kill-after=2s "$@"
          }

          trap cleanup_zero_copy_processes EXIT INT TERM
          cleanup_zero_copy_processes

          if [ -x /opt/iceoryx/bin/iox-roudi ]; then
            unset ARA_COM_BINDING_MANIFEST
            export ARA_COM_EVENT_BINDING=iceoryx

            hard_timeout 12s /opt/iceoryx/bin/iox-roudi > /tmp/lwrcl_autosar_zc_roudi.log 2>&1 &
            ZC_ROUDI_PID=$!
            hard_timeout 12s "${AUTOSAR_AP_PREFIX}/bin/autosar_vsomeip_routing_manager" > /tmp/lwrcl_autosar_zc_rm.log 2>&1 &
            ZC_RM_PID=$!
            sleep 1

            hard_timeout 8s apps/install-adaptive-autosar/bin/example_zero_copy_sub > /tmp/lwrcl_autosar_zc_sub.log 2>&1 &
            ZC_SUB_PID=$!
            sleep 1

            hard_timeout 6s apps/install-adaptive-autosar/bin/example_zero_copy_pub > /tmp/lwrcl_autosar_zc_pub.log 2>&1 || true
            wait "${ZC_SUB_PID}" || true
            wait "${ZC_RM_PID}" || true
            wait "${ZC_ROUDI_PID}" || true

            grep -q "Can loan messages: yes" /tmp/lwrcl_autosar_zc_pub.log
            grep -q "Can loan messages: yes" /tmp/lwrcl_autosar_zc_sub.log
            grep -q "\[Zero-copy\] Publishing image" /tmp/lwrcl_autosar_zc_pub.log
            grep -q "\[Zero-copy\] Received image" /tmp/lwrcl_autosar_zc_sub.log
            ! grep -q "Received image: 0x0" /tmp/lwrcl_autosar_zc_sub.log
            ! grep -q "APP_WITH_SAME_NAME_STILL_RUNNING" /tmp/lwrcl_autosar_zc_sub.log
            ! grep -q "APP_WITH_SAME_NAME_STILL_RUNNING" /tmp/lwrcl_autosar_zc_pub.log
          else
            echo "Skip zero-copy smoke (iox-roudi is unavailable)."
          fi
