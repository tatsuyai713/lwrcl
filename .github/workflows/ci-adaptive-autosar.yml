name: CI (Adaptive AUTOSAR)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ADAPTIVE_AUTOSAR_REF: "master"
  DDS_PREFIX: /opt/cyclonedds
  ICEORYX_PREFIX: /opt/iceoryx
  VSOMEIP_PREFIX: /opt/vsomeip
  AUTOSAR_AP_PREFIX: /opt/autosar-ap
  LWRCL_PREFIX: /opt/autosar-ap-libs

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure-cli*
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake automake autoconf git curl \
            libasio-dev libssl-dev libyaml-cpp-dev \
            libboost-dev libboost-thread-dev libboost-filesystem-dev libboost-system-dev \
            libopencv-dev \
            python3 python3-pip

      - name: Cache middleware stack
        id: cache-middleware-stack
        uses: actions/cache@v4
        with:
          path: |
            /opt/cyclonedds
            /opt/iceoryx
            /opt/vsomeip
          key: adaptive-autosar-middleware-${{ env.ADAPTIVE_AUTOSAR_REF }}-ubuntu2404-v2

      - name: Build & install middleware stack (Adaptive-AUTOSAR script)
        run: |
          set -euo pipefail
          if [ "${{ steps.cache-middleware-stack.outputs.cache-hit }}" != "true" ] || [ ! -x "$ICEORYX_PREFIX/bin/iox-roudi" ] || [ ! -f "$VSOMEIP_PREFIX/lib/libvsomeip3.so" ] || [ ! -f "$VSOMEIP_PREFIX/lib/liblwrcl_cdr.a" ]; then
            WORK="$RUNNER_TEMP/adaptive_autosar_build"
            mkdir -p "$WORK" && cd "$WORK"
            if [ ! -d Adaptive-AUTOSAR ]; then
              git clone --depth 1 --branch ${ADAPTIVE_AUTOSAR_REF} https://github.com/tatsuyai713/Adaptive-AUTOSAR.git
            fi
            cd Adaptive-AUTOSAR
            ./scripts/install_middleware_stack.sh \
              --install-base-deps \
              --cyclonedds-prefix ${DDS_PREFIX} \
              --iceoryx-prefix ${ICEORYX_PREFIX} \
              --vsomeip-prefix ${VSOMEIP_PREFIX}
          fi
          test -x "$DDS_PREFIX/bin/idlc"
          test -x "$ICEORYX_PREFIX/bin/iox-roudi"
          test -f "$VSOMEIP_PREFIX/lib/libvsomeip3.so"
          test -f "$VSOMEIP_PREFIX/lib/liblwrcl_cdr.a"

      - name: Cache Adaptive AUTOSAR runtime
        id: cache-adaptive-autosar
        uses: actions/cache@v4
        with:
          path: /opt/autosar-ap
          key: adaptive-autosar-runtime-${{ env.ADAPTIVE_AUTOSAR_REF }}-ubuntu2404-v5

      - name: Build & install Adaptive AUTOSAR runtime
        run: |
          set -euo pipefail
          if [ "${{ steps.cache-adaptive-autosar.outputs.cache-hit }}" != "true" ] || [ ! -x "$AUTOSAR_AP_PREFIX/bin/autosar-generate-comm-manifest" ] || [ ! -x "$AUTOSAR_AP_PREFIX/bin/autosar-generate-proxy-skeleton" ]; then
            WORK="$RUNNER_TEMP/adaptive_autosar_build"
            mkdir -p "$WORK" && cd "$WORK"
            if [ ! -d Adaptive-AUTOSAR ]; then
              git clone --depth 1 --branch ${ADAPTIVE_AUTOSAR_REF} https://github.com/tatsuyai713/Adaptive-AUTOSAR.git
            fi
            cd Adaptive-AUTOSAR
            ./scripts/build_and_install_autosar_ap.sh \
              --prefix ${AUTOSAR_AP_PREFIX} \
              --build-dir build-ci \
              --vsomeip-prefix ${VSOMEIP_PREFIX} \
              --iceoryx-prefix ${ICEORYX_PREFIX} \
              --cyclonedds-prefix ${DDS_PREFIX}
          fi
          test -x "$AUTOSAR_AP_PREFIX/bin/autosar-generate-comm-manifest"
          test -x "$AUTOSAR_AP_PREFIX/bin/autosar-generate-proxy-skeleton"

      - name: Configure environment
        run: |
          echo "$DDS_PREFIX/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$ICEORYX_PREFIX/lib:$DDS_PREFIX/lib:$VSOMEIP_PREFIX/lib:$AUTOSAR_AP_PREFIX/lib:$LWRCL_PREFIX/lib" >> $GITHUB_ENV

      - name: Install Python dependency for ARXML generation
        run: |
          python3 -m venv "$RUNNER_TEMP/ci-python"
          "$RUNNER_TEMP/ci-python/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/ci-python/bin/python" -m pip install pyyaml
          echo "$RUNNER_TEMP/ci-python/bin" >> "$GITHUB_PATH"

      - name: Build & install lwrcl (Adaptive AUTOSAR)
        run: |
          sudo ldconfig
          ./build_libraries.sh adaptive-autosar install
          ./build_data_types.sh adaptive-autosar install
          ./build_lwrcl.sh adaptive-autosar install
          ./build_apps.sh adaptive-autosar install

      - name: Smoke check installed artifacts
        run: |
          test -f /opt/autosar-ap-libs/lib/liblwrcl.so
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest.arxml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest.yaml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_dds.yaml
          if /opt/autosar-ap/bin/autosar-generate-comm-manifest --help 2>&1 | grep -q "iceoryx"; then
            test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_iceoryx.yaml
          fi
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_manifest_vsomeip.yaml
          test -f /opt/autosar-ap-libs/share/lwrcl/autosar/lwrcl_autosar_topic_mapping.yaml
          test -x apps/install-adaptive-autosar/bin/example_spin
          test -x apps/install-adaptive-autosar/bin/example_service_server

      - name: Verify tests use normal publish API
        run: |
          set -euo pipefail
          ! grep -R "borrow_loaned_message\|LoanedMessage\|LoanedSubscriptionMessage\|can_loan_messages\|is_loaned\|take_loaned" test/src test/CMakeLists.txt README.md README_JA.md

      - name: Run tests (Adaptive AUTOSAR)
        run: |
          AUTOSAR_TEST_TIMEOUT=5 ./test/run_tests_adaptive_autosar.sh all

      - name: Run Adaptive AUTOSAR smoke
        run: |
          ./run_smoke_local.sh --backend adaptive-autosar --no-build
